<text class="small" x="590" y="872">用于快速判断，不替代兽医诊断</text>
<text class="value" x="590" y="905">1. 猫粮没有吃空，最低剩余约 6g，说明自助采食期间食物始终可得。</text>
<text class="value" x="590" y="932">2. 19:37-21:17 摄入速度约 6.30g/h，是全天最集中的进食段。</text>
<text class="value" x="590" y="959">3. 18:00-24:00 估算摄入约 21.9g，占核心窗口约 42.5%。</text>
<text class="value" x="590" y="986">4. 两碗合计减少约 104.5ml；即使扣除误差，也不像饮水不足。</text>
<text class="value" x="590" y="1013">5. 冻干奖励未计入，真实热量略高于猫粮热量估算。</text>
<text class="note" x="60" y="1092">注：时段分布基于区间平均速度估算；水碗减少量不等于精确饮水量。建议增加对照水碗估算蒸发/泼洒误差。</text>
